name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t pulse:${{ github.sha }} -t pulse:latest .

      - name: Save Docker image
        run: docker save pulse:latest | gzip > pulse-image.tar.gz

      - name: Deploy to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "pulse-image.tar.gz,docker-compose.yml"
          target: "/opt/pulse"

      - name: Start services on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/pulse
            docker load < pulse-image.tar.gz
            docker compose up -d --force-recreate app
            docker compose exec -T app npx prisma migrate deploy
            rm pulse-image.tar.gz
