name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://unused:unused@localhost:5432/unused
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx svelte-kit sync
      - run: pnpm db:generate
      - run: pnpm check

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://pulse:pulse@localhost:5432/pulse?schema=public
      BETTER_AUTH_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx svelte-kit sync
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm test:unit

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://pulse:pulse@localhost:5432/pulse?schema=public
      BETTER_AUTH_SECRET: ci-test-secret
      BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:4173
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx svelte-kit sync
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm build
      - run: npx playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  e2e-docker:
    runs-on: ubuntu-latest
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: sqlite
            build-arg: DATABASE_URL=file:./data/pulse.db
          - db: postgresql
            build-arg: DATABASE_URL=postgresql://build:build@localhost:5432/build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: pulse-e2e:latest
          build-args: ${{ matrix.build-arg }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services (PostgreSQL)
        if: matrix.db == 'postgresql'
        run: |
          docker compose -f docker-compose.e2e.yml up -d
          echo "Waiting for app to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "App is healthy!"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "App failed to become healthy"
              docker compose -f docker-compose.e2e.yml logs app
              exit 1
            fi
            sleep 2
          done

      - name: Start services (SQLite)
        if: matrix.db == 'sqlite'
        run: |
          docker run -d --name pulse-e2e \
            -e BETTER_AUTH_SECRET=e2e-docker-test-secret \
            -e BETTER_AUTH_URL=http://localhost:3000 \
            -e BETTER_AUTH_TRUSTED_ORIGINS=http://localhost:3000 \
            -p 3000:3000 \
            pulse-e2e:latest
          echo "Waiting for app to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "App is healthy!"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "App failed to become healthy"
              docker logs pulse-e2e
              exit 1
            fi
            sleep 2
          done

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium

      - name: Run Docker e2e tests
        run: pnpm test:e2e-docker

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-e2e-report-${{ matrix.db }}
          path: playwright-report/

      - name: Show container logs on failure
        if: failure()
        run: |
          if [ "${{ matrix.db }}" = "postgresql" ]; then
            docker compose -f docker-compose.e2e.yml logs app
          else
            docker logs pulse-e2e
          fi

      - name: Cleanup
        if: always()
        run: |
          if [ "${{ matrix.db }}" = "postgresql" ]; then
            docker compose -f docker-compose.e2e.yml down -v
          else
            docker rm -f pulse-e2e 2>/dev/null || true
          fi

  docker:
    runs-on: ubuntu-latest
    needs: [check, test, e2e, e2e-docker]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/emmabyte-engineering/pulse
            emmabyteeng/pulse
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: emmabyteeng/pulse:${{ steps.meta.outputs.version }}
          only-severities: critical,high
          only-fixed: true
          exit-code: true
          only-package-types: npm

  release:
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          {
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "## Docker"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/emmabyte-engineering/pulse:${GITHUB_REF_NAME#v}"
            echo "# or"
            echo "docker pull emmabyteeng/pulse:${GITHUB_REF_NAME#v}"
            echo '```'
          } > /tmp/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          generate_release_notes: false
